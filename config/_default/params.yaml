hugoblox:
  schema: "2.0"
  identity:
    name: Thomas Markhorst
    type: person
    tagline: PhD Student | TU Delft
    description: I’m a PhD candidate at TU Delft working on artificial intelligence for human motion understanding and social interaction using multi-modal LLMs.
  theme:
    mode: system
    pack: default
    colors:
      primary: slate
      secondary: ""
      neutral: ""
  typography:
    font: sans
    size: md
  layout:
    radius: md
    spacing: comfortable
    avatar_shape: circle
  header:
    enable: true
    style: navbar
    sticky: true
    align: right
    search: true
    theme_toggle: true
    cta:
      enable: false
  footer:
    style: minimal
    language_switcher: true
  copyright:
    notice: © {year} {name}
    license:
      type: cc
  content:
    math:
      enable: false
    toc:
      enable: true
    reading_time:
      enable: true
  search:
    enable: true
  debug:
    enable: false
