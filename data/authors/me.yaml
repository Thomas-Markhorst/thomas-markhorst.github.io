bio: "I'm a PhD student at TU Delft working on artificial intelligence for human motion understanding and social interaction. My research explores how models can extract, represent, and reason over human behavior using multimodal signals such as video and 2D/3D pose.\ 


  \ I design generative and transformer-based models that capture fine-grained, temporally coherent human motion, with a particular focus on multi-person settings. By leveraging structured representations of the body, I aim to improve how machines interpret actions, anticipate future behavior, and understand interactions between people.More broadly, I am interested in building AI systems that can reason about humans in context and operate effectively in socially complex environments.\n
  
  \ Previsouly I have worked as a computer vision research intern at Bosch and BMW, obtained my MSc cum laude & obtained my BSc cum laude and with honours.\n"
